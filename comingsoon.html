<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon · AVI International</title>

  <!-- ── SECURITY HEADERS ── -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=()" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Yatra+One&family=Tiro+Devanagari+Hindi:ital@0;1&family=Noto+Serif+Devanagari:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-XM2NL73TXC');
</script>

  <style>
    /* ── exact same CSS as index (palette only) ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --saffron:    #E8821A;
      --saffron-2:  #F5A54A;
      --saffron-bg: #FFF4E8;
      --green:      #138808;
      --green-2:    #1FAD0A;
      --green-bg:   #EEF7EC;
      --white:      #FFFFFF;
      --cream:      #FDFAF4;
      --cream-2:    #F7F0E3;
      --gold:       #C9A227;
      --gold-soft:  #E8C766;
      --ink:        #1A1A1A;
      --ink-2:      #3D2B1A;
      --muted:      #6B5A4A;
      --border:     rgba(232,130,26,0.18);
      --leaf:       #138808;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--ink);
      line-height: 1.65;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .hi {
      font-family: 'Noto Serif Devanagari', serif;
      font-weight: 500;
    }

    /* ── HERO (coming soon only) ── */
    .hero {
      min-height: 100vh;
      width: 100%;
      background:
        radial-gradient(ellipse at 80% 30%, rgba(19,136,8,0.08) 0%, transparent 55%),
        linear-gradient(160deg, var(--saffron-bg) 0%, var(--white) 50%, var(--green-bg) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 40px 5vw;
      border-bottom: 4px solid var(--green);
      flex: 1;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--saffron) 33%, var(--white) 33%, var(--white) 66%, var(--green) 66%);
      pointer-events: none;
      z-index: 3;
    }

    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 20% 80%, rgba(232,130,26,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 820px;
      position: relative;
      z-index: 2;
      width: 100%;
      text-align: center;
      padding: 20px;
    }

    .coming-icon {
      font-size: 5rem;
      line-height: 1;
      margin-bottom: 20px;
    }

    .hero h1 {
      font-family: 'Marcellus', serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 400;
      line-height: 1.15;
      color: var(--ink-2);
      margin-bottom: 10px;
    }
    .hero h1 em { font-style: normal; color: var(--saffron); }

    .hero-h1-hindi {
      display: block;
      font-family: 'Yatra One', serif;
      font-size: clamp(1.2rem, 2.5vw, 1.8rem);
      color: var(--green);
      letter-spacing: 0.02em;
    }

    .hero-divider {
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, var(--saffron), var(--green));
      margin: 20px auto;
      border-radius: 2px;
    }

    .back-btn {
      display: inline-block;
      background: linear-gradient(135deg, var(--saffron) 0%, var(--green) 100%);
      color: var(--white) !important;
      padding: 14px 34px;
      border-radius: 4px;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      box-shadow: 0 6px 20px rgba(19,136,8,0.25);
      transition: filter 0.2s, transform 0.2s;
      border: none;
      cursor: pointer;
      margin-top: 30px;
    }
    .back-btn:hover {
      filter: brightness(0.92);
      transform: translateY(-2px);
    }

    @media (max-width: 768px) {
      .hero { padding: 20px 5vw; }
    }
  </style>
</head>
<body>

  <!-- ── COMING SOON HERO (blank page, only "Coming Soon") ── -->
  <section class="hero" id="coming-soon">
    <div class="hero-inner">
      <div class="coming-icon">🛍️</div>
      <h1 data-testid="hero-heading">Online Store <em>Coming Soon</em></h1>
      <span class="hero-h1-hindi" data-testid="hero-heading-hindi">ऑनलाइन स्टोर आ रहा है</span>
      <div class="hero-divider"></div>
      <a href="index.html" class="back-btn">← Back to Home</a>
    </div>
  </section>

</body>
</html>
